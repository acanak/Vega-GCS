name: Build Desktop (Windows / macOS / Linux)

# v* etiketi push edildiğinde otomatik release oluşturur.
# Actions sekmesinden elle de tetiklenebilir (workflow_dispatch).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # tag'e bağlı release oluşturmak için

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
          - os: ubuntu-latest
            name: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web-gcs (vite)
        run: pnpm --filter @wmp/web-gcs build

      # apps/desktop pnpm workspace dışında, npm ile yönetiliyor.
      - name: Install desktop dependencies
        run: npm install --prefix apps/desktop

      - name: Build desktop app (electron-builder)
        run: npm --prefix apps/desktop run build
        env:
          # CI'da kod imzalama sertifikası yok → imzalamayı kapat (imzasız ama çalışır çıktı).
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # electron-builder'ın otomatik publish davranışını kapat; release'i ayrı job yönetir.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vega-gcs-${{ matrix.name }}
          if-no-files-found: error
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.AppImage

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Yalnızca v* etiketi push edildiğinde release oluştur.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true # önce taslak olarak oluştur; kontrol edip elle yayınlarsın
          generate_release_notes: true
          files: artifacts/**/*
