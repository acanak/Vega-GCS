# Masaüstü binary'leri: Windows (NSIS + portable .exe), Linux (.AppImage), macOS (.dmg + .zip).
# Tetikleme: elle (workflow_dispatch) ya da v* etiketi. Etikette ayrıca taslak GitHub Release açılır.
# İmza yok (CSC_IDENTITY_AUTO_DISCOVERY=false) — sertifika eklenince kaldırılabilir.
name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    name: ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows
          - os: ubuntu-latest
            artifact: linux
          - os: macos-latest
            artifact: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      # pnpm sürümü kökteki package.json "packageManager" alanından gelir
      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck + tests
        run: |
          pnpm -r --if-present typecheck
          pnpm -r --if-present test

      - name: Build web app
        run: pnpm --filter @wmp/web-gcs build

      # apps/desktop pnpm workspace dışıdır (electron-builder uyumu) — npm ile kurulur
      - name: Install desktop deps
        run: npm --prefix apps/desktop ci

      - name: Build desktop binaries
        run: npm --prefix apps/desktop run build -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - uses: actions/upload-artifact@v4
        with:
          name: vega-gcs-${{ matrix.artifact }}
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.AppImage
          if-no-files-found: error

  # v* etiketinde üç platformun çıktılarıyla taslak Release aç (yayınlamadan önce gözden geçirilir)
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: dist/*
