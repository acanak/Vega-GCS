# Cloudflare deploy hedefi (statik site — Workers Static Assets).
# `npx wrangler deploy` bunu okur; monorepo kökünde hangi projeyi/klasörü
# yükleyeceğini bilir (aksi halde "root of a workspace" hatası verir).
# name, Cloudflare panelindeki proje adıyla AYNI olmalı.
name = "vega-gcs"
compatibility_date = "2024-11-01"

[assets]
directory = "apps/web-gcs/dist"
# SPA/PWA: eşleşmeyen yollarda index.html (200) sun
not_found_handling = "single-page-application"
